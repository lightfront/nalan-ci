<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>纳兰词</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css?v=2">
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="header-inner">
      <h1 class="title">纳兰词</h1>
      <p class="subtitle">清 · 纳兰性德 · <span id="poemCount">0</span> 首 · 含讲解 <span id="commentaryCount">0</span> 首</p>
    </div>
  </header>

  <!-- Controls -->
  <section class="controls">
    <div class="controls-inner">
      <div class="search-box">
        <svg class="search-icon" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>
        </svg>
        <input type="text" id="searchInput" placeholder="搜索词牌、题目或词句…" autocomplete="off">
      </div>
      <div class="filter-group">
        <select id="rhythmicFilter">
          <option value="">全部词牌</option>
        </select>
      </div>
    </div>
  </section>

  <!-- Poem Grid -->
  <main class="main">
    <div class="poem-grid" id="poemGrid"></div>
    <div class="empty-state" id="emptyState">
      <p>未找到匹配的词作</p>
    </div>
  </main>

  <!-- Modal -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal" id="modal">
      <button class="modal-close" id="modalClose" aria-label="关闭">&times;</button>
      <div class="modal-body" id="modalBody"></div>
    </div>
  </div>

  <!-- Footer -->
  <footer class="footer">
    <p>纳兰性德（1655—1685），字容若 · 数据来源：<a href="https://github.com/chinese-poetry/chinese-poetry" target="_blank" rel="noopener">chinese-poetry</a></p>
  </footer>

  <script src="main.js?v=2"></script>
</body>
</html>
